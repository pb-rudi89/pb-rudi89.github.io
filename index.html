<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Data PB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Form Pengisian Data PB</h2>
        <form id="formPB">
            <label>Tingkat Daerah:</label>
            <select name="tingkat" required>
                <option value="">-- Pilih Tingkat --</option>
                <option value="Pusat">Pusat</option>
                <option value="Daerah">Daerah</option>
            </select>

            <label>Provinsi:</label>
            <select name="provinsi" id="provinsi" required>
                <option value="">-- Pilih Provinsi --</option>
            </select>

            <label>Kabupaten:</label>
            <select name="kabupaten" id="kabupaten" required>
                <option value="">-- Pilih Kabupaten --</option>
            </select>

            <input type="text" name="nama" placeholder="Nama Lengkap" required>
            <input type="text" name="jabatan" placeholder="Jabatan" required>
            <input type="text" name="nik" placeholder="NIK" required>
            <input type="text" name="kta" placeholder="Nomor KTA" required>
            <input type="tel" name="hp" placeholder="No. HP / WhatsApp" required>

            <button type="submit" id="btnSubmit">Kirim Data</button>
        </form>
        <div id="status"></div>
    </div>

    <!-- Panggil file JavaScript -->
    <script src="script.js"></script>
</body>
</html>
